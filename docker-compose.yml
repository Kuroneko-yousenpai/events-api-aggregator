services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: events
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d events"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:secret@db:5432/events
      TEST_DATABASE_URL: postgresql+asyncpg://app:secret@db:5432/events_test
      EVENTS_PROVIDER_BASE_URL: https://events-provider.dev-2.consollite.cc
      EVENTS_PROVIDER_API_KEY: ${EVENTS_PROVIDER_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
